<div class="fixed inset-0 z-40" (click)="close()"></div>

<div
  class="fixed z-50 bg-white border border-gray-200 rounded-xl shadow-lg p-3 w-56"
  [style.top.px]="data().y"
  [style.left.px]="data().x">

  <p class="text-xs text-gray-400 mb-2 line-clamp-2">{{ data().sentence }}</p>

  @if (data().clause) {
    <div class="flex gap-3 mb-2">
      <div class="">
        <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">
          {{ data().clause!.clause_type }}
        </span>
      </div>
      <button
        (click)="onRemove()"
        class="w-full text-left text-xs text-red-500 hover:text-red-700 px-2 py-1 rounded hover:bg-red-50 transition-colors mb-2">
        Remove label
      </button>
    </div>
    <hr class="border-gray-100 mb-2">
  }

  @if (clauseTypes().length > 0) {
    <p class="text-xs text-gray-400 font-medium mb-1">Apply label</p>
    @for (type of clauseTypes(); track type) {
      <button
        (click)="onApplyType(type)"
        class="w-full text-left text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700 px-2 py-1 rounded transition-colors">
        {{ type }}
      </button>
    }
    <hr class="border-gray-100 my-2">
  }

  <div class="flex gap-1">
    <input
      [(ngModel)]="customClauseType"
      type="text"
      placeholder="Custom type..."
      class="flex-1 border border-gray-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500"
      (keydown.enter)="onApplyCustom()"
    />
    <button
      (click)="onApplyCustom()"
      class="bg-blue-600 text-white px-2 py-1 rounded text-xs hover:bg-blue-700 transition-colors">
      OK
    </button>
  </div>
</div>
