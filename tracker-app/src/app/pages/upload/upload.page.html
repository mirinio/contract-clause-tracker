<div class="min-h-screen bg-gray-50">

  <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4">
    <a routerLink="/" class="text-gray-400 hover:text-gray-600 transition-colors">Back</a>
    <h1 class="text-xl font-semibold text-gray-800">Upload Contract</h1>
  </div>

  <div class="max-w-2xl mx-auto px-6 py-12">
    <div
      class="border-2 border-dashed rounded-xl p-12 text-center transition-colors cursor-pointer"
      [class.border-blue-400]="isDragging()"
      [class.bg-blue-50]="isDragging()"
      [class.border-gray-300]="!isDragging()"
      (dragover)="onDragOver($event)"
      (dragleave)="isDragging.set(false)"
      (drop)="onDrop($event)"
      (click)="fileInput.click()">

      <div class="text-4xl mb-4">📄</div>
      <p class="text-gray-600 font-medium mb-1">Drop your contract here</p>
      <p class="text-gray-400 text-sm">or click to browse</p>
      <p class="text-gray-400 text-xs mt-3">.txt and .md files only</p>

      <input
        #fileInput
        type="file"
        accept=".txt,.md"
        class="hidden"
        (change)="onFileSelected($event)"
      />
    </div>

    @let file = selectedFile();
    @if (file) {
      <div class="mt-6 bg-white border border-gray-200 rounded-xl p-4 flex items-center justify-between">
        <div>
          <p class="font-medium text-gray-800 text-sm">{{ file.name }}</p>
          <p class="text-gray-400 text-xs mt-1">{{ (file.size / 1024).toFixed(1) }} KB</p>
        </div>
        <button
          (click)="selectedFile.set(undefined)"
          class="text-gray-400 hover:text-gray-600 transition-colors text-lg">
          ✕
        </button>
      </div>
    }

    @if (error()) {
      <div class="mt-4 bg-red-50 border border-red-200 rounded-xl p-4 text-red-600 text-sm">
        {{ error() }}
      </div>
    }

    @if (selectedFile()) {
      <button
        (click)="upload()"
        [disabled]="uploading()"
        class="mt-6 w-full bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        {{ uploading() ? 'Uploading...' : 'Upload Contract' }}
      </button>
    }

  </div>
</div>
